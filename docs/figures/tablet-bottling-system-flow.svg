  <text class="file-title" x="858" y="668">status_signal.v（四状态状态机）</text><rect x="960" y="770" width="370" height="155" rx="14" fill="#f5f1ff" stroke="#7c3aed" stroke-width="4"/>
  <text class="box-title" x="988" y="826">INIT</text>
  <text class="box-body" x="988" y="870">允许配置</text>
<text class="box-body" x="988" y="910">config_set = 1</text><rect x="1510" y="770" width="410" height="155" rx="14" fill="#f5f1ff" stroke="#7c3aed" stroke-width="4"/>
  <text class="box-title" x="1538" y="826">RUNNING</text>
  <text class="box-body" x="1538" y="870">系统运行</text>
<text class="box-body" x="1538" y="910">run = 1</text><rect x="960" y="1070" width="370" height="155" rx="14" fill="#f5f1ff" stroke="#7c3aed" stroke-width="4"/>
  <text class="box-title" x="988" y="1126">FAULT</text>
  <text class="box-body" x="988" y="1170">配置非法</text>
<text class="box-body" x="988" y="1210">confirm 回 INIT</text><rect x="1510" y="1070" width="410" height="155" rx="14" fill="#f5f1ff" stroke="#7c3aed" stroke-width="4"/>
  <text class="box-title" x="1538" y="1126">PAUSE</text>
  <text class="box-body" x="1538" y="1170">暂停 / 完成</text>
