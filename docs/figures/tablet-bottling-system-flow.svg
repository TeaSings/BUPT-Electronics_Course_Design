  <text class="box-body" x="2218" y="1720">state + disp_sel -&gt; disp*</text><path d="M 510 355 L 780 375" fill="none" stroke="#2563eb" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-control)"/>
  <rect x="525" y="282" width="130" height="69" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2.4"/>
