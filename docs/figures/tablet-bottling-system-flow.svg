  <rect x="715" y="744" width="260" height="104" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
  <text class="label" x="845" y="778.5" text-anchor="middle" dominant-baseline="middle" fill="#dc2626">config_valid</text>
<text class="label" x="845" y="813.5" text-anchor="middle" dominant-baseline="middle" fill="#dc2626">/ warn</text><path d="M 1330 850 L 1510 850" fill="none" stroke="#dc2626" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-alert)"/>
  <rect x="1355" y="684" width="260" height="69" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
  <text class="label" x="1485" y="718.5" text-anchor="middle" dominant-baseline="middle" fill="#dc2626">config_valid</text><path d="M 1145 925 L 1145 1070" fill="none" stroke="#dc2626" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-alert)"/>
  <rect x="1167" y="976" width="130" height="69" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
  <text class="label" x="1232" y="1010.5" text-anchor="middle" dominant-baseline="middle" fill="#dc2626">warn</text><path d="M 1715 925 L 1715 1070" fill="none" stroke="#dc2626" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-alert)"/>
  <rect x="1737" y="976" width="296" height="69" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
  <text class="label" x="1885" y="1010.5" text-anchor="middle" dominant-baseline="middle" fill="#dc2626">done / confirm</text><path d="M 1920 850 L 2350 872" fill="none" stroke="#2563eb" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-control)"/>
  <rect x="1995" y="770" width="134" height="69" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2.4"/>
  <text class="label" x="2062" y="804.5" text-anchor="middle" dominant-baseline="middle" fill="#2563eb">run=1</text><path d="M 2565 945 L 2565 1250" fill="none" stroke="#ea580c" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-pulse)"/>
  <rect x="2587" y="1060" width="188" height="69" rx="9" fill="#ffffff" stroke="#ea580c" stroke-width="2.4"/>
  <text class="label" x="2681" y="1094.5" text-anchor="middle" dominant-baseline="middle" fill="#ea580c">count_en</text><path d="M 2565 1395 L 2565 1620" fill="none" stroke="#16a34a" stroke-width="4.6" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow-data)"/>
  <rect x="2587" y="1476" width="152" height="69" rx="9" fill="#ffffff" stroke="#16a34a" stroke-width="2.4"/>
