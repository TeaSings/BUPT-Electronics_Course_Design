  <text class="file-title" x="148" y="748">config_core.v</text><rect x="230" y="830" width="455" height="175" rx="14" fill="#eef4ff" stroke="#2563eb" stroke-width="4"/>
  <text class="box-title" x="258" y="886">参数设置与校验</text>
  <text class="box-body" x="258" y="930">输出 config_valid / warn</text>
